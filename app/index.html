<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Habit Tracker</title>
    </head>
    <body>
        <!---This is the header of the page- im learning html-->
        <h1>Habit Tracker</h1>
        <hr>
        <br>
        <p>Track your habits and achieve your goals</p>
        <form>
            <label for="habit">Habit:</label>
            <input type="text" id="habit" name="habit">
            <label for="frequency">Frequency:</label>
            <input type="number" id="frequency" name="frequency">
            <label for="description">Description:</label>
            <textarea id="description" name="description"></textarea>
            <label for="completed">Completed:</label>
            <input type="checkbox" id="completed" name="completed">
        </form>
        
    </body>
    <script>
        const habit = document.getElementById("habit");
    </script>
</html>
